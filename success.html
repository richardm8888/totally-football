<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totally Football – The Board Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #1c2637;
            --navy-dark: #111923;
            --navy-mid: #243045;
            --lime: #b8e04a;
            --lime-bright: #cdf05a;
            --slate: #3a4d5c;
            --white: #ffffff;
            --off-white: #e8edf2;
            --text-muted: #7a8fa8;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--navy-dark); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

        ul {
            text-align: left;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .lime { color: var(--lime); }
        /* ── HERO ── */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 80px 24px 100px; overflow: hidden;
        }
        /* Pitch lines */
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background:
                repeating-linear-gradient(-52deg, transparent, transparent 80px,
                    rgba(184,224,74,0.03) 80px, rgba(184,224,74,0.03) 82px);
            pointer-events: none;
        }
        /* Glow */
        .hero-glow {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(184,224,74,0.09) 0%, transparent 65%);
            pointer-events: none;
        }
        .hero-badge {
            position: relative; z-index: 2;
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(184,224,74,0.12);
            border: 1px solid rgba(184,224,74,0.35);
            color: var(--lime);
            font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
            font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
            padding: 7px 20px; border-radius: 100px; margin-bottom: 36px;
            animation: fadeUp 0.6s ease both;
        }
        .hero-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--lime); animation: pulse 2s infinite; }
        .hero-logo {
            position: relative; z-index: 2;
            width: min(560px, 88vw); margin-bottom: 36px;
            animation: fadeUp 0.7s 0.1s ease both;
            filter: drop-shadow(0 12px 48px rgba(184,224,74,0.18));
        }
        /* Phase pills */
        .hero-phases {
            position: relative; z-index: 2;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px;
            animation: fadeUp 0.7s 0.2s ease both;
        }
        .phase {
            font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
            font-size: 0.95rem; letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--white); padding: 5px 16px;
            background: rgba(255,255,255,0.07); border-radius: 4px;
        }
        .phase-arrow { color: var(--lime); font-size: 1rem; }
        .hero-tagline {
            position: relative; z-index: 2;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            letter-spacing: 0.06em; line-height: 0.95;
            margin-bottom: 20px;
            animation: fadeUp 0.7s 0.25s ease both;
        }
        .hero-sub {
            position: relative; z-index: 2;
            font-size: clamp(1rem, 2.5vw, 1.15rem); color: var(--text-muted);
            max-width: 460px; line-height: 1.65; margin-bottom: 48px;
            animation: fadeUp 0.7s 0.3s ease both;
        }
        .hero-cta-group {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            animation: fadeUp 0.7s 0.35s ease both;
        }
        .btn-primary {
            display: inline-block; background: var(--lime); color: var(--navy-dark);
            font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.12em;
            padding: 17px 52px; border-radius: 4px; text-decoration: none; border: none; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            box-shadow: 0 4px 28px rgba(184,224,74,0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(184,224,74,0.55); background: var(--lime-bright); }
        .hero-cta-note { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.06em; }
        .scroll-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: var(--text-muted); font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
            animation: bounce 2.2s infinite;
        }
        .scroll-hint svg { width: 16px; height: 16px; stroke: var(--lime); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ── HOW IT WORKS ── */
        .how {
            background: var(--navy);
            padding: 100px 24px; position: relative;
        }
        .how::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent 0%, var(--lime) 50%, transparent 100%);
        }
        .section-eyebrow {
            font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
            font-size: 0.72rem; letter-spacing: 0.24em; text-transform: uppercase;
            color: var(--lime); text-align: center; margin-bottom: 10px;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem); letter-spacing: 0.05em;
            text-align: center; margin-bottom: 70px; line-height: 1;
        }

        /* Phase cards */
        .phases-track {
            display: flex; align-items: stretch;
            max-width: 900px; margin: 0 auto 0;
            gap: 0;
        }
        .phase-card {
            flex: 1; position: relative;
            background: var(--navy-dark);
            border: 1px solid rgba(184,224,74,0.1);
            padding: 36px 28px; text-align: center;
            transition: border-color 0.25s, transform 0.25s;
        }
        .phase-card:first-child { border-radius: 8px 0 0 8px; }
        .phase-card:last-child  { border-radius: 0 8px 8px 0; }
        .phase-card:not(:last-child) { border-right: none; }
        .phase-card:hover { border-color: rgba(184,224,74,0.4); transform: translateY(-4px); z-index: 1; }
        .phase-num {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--lime); color: var(--navy-dark);
            font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
        }
        .phase-label {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
            letter-spacing: 0.06em; color: var(--lime); margin-bottom: 10px;
        }
        .phase-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; }

        /* Arrow connectors */
        .phase-connector {
            display: flex; align-items: center; justify-content: center;
            padding: 0 4px; color: var(--lime); font-size: 1.4rem;
            position: relative; top: 0; flex-shrink: 0; margin-top: -4px;
            background: var(--navy);
        }

        /* Wildcards callout */
        .wildcard-strip {
            max-width: 900px; margin: 28px auto 0;
            background: rgba(184,224,74,0.06);
            border: 1px solid rgba(184,224,74,0.2);
            border-radius: 8px; padding: 22px 32px;
            display: flex; align-items: center; gap: 18px;
        }
        .wildcard-strip .wc-icon img { height: 48px; filter: drop-shadow(0 4px 16px rgba(184,224,74,0.25)); }
        .wildcard-strip p { font-size: 0.92rem; color: var(--text-muted); line-height: 1.55; }
        .wildcard-strip strong { color: var(--white); }

        /* ── FEATURES ── */
        .features { padding: 100px 24px; background: var(--navy-dark); }
        .features-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px; max-width: 960px; margin: 0 auto;
        }
        .feature-card {
            background: var(--navy);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; padding: 30px 26px;
            position: relative; overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        .feature-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
            background: var(--lime); transform: scaleX(0); transform-origin: left;
            transition: transform 0.3s ease;
        }
        .feature-card:hover { transform: translateY(-4px); border-color: rgba(184,224,74,0.25); }
        .feature-card:hover::after { transform: scaleX(1); }
        .feature-icon { font-size: 2rem; margin-bottom: 14px; display: block; }
        .feature-title {
            font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
            font-size: 1.15rem; letter-spacing: 0.04em; margin-bottom: 8px;
        }
        .feature-text { font-size: 0.88rem; color: var(--text-muted); line-height: 1.65; }

        /* ── KS CALLOUT ── */
        .ks-callout {
            background: var(--navy); padding: 80px 24px; text-align: center;
            position: relative; overflow: hidden;
            border-top: 1px solid rgba(184,224,74,0.12);
            border-bottom: 1px solid rgba(184,224,74,0.12);
        }
        .ks-callout::before {
            content: 'KICKSTARTER'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(60px, 18vw, 160px);
            color: rgba(184,224,74,0.04); white-space: nowrap; pointer-events: none; letter-spacing: 0.04em;
        }
        .ks-callout h2 {
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem);
            letter-spacing: 0.05em; margin-bottom: 14px; position: relative;
        }
        .ks-callout h2 span { color: var(--lime); }
        .ks-callout p { color: var(--text-muted); max-width: 440px; margin: 0 auto 32px; line-height: 1.65; position: relative; }

        /* ── SIGNUP ── */
        .signup {
            padding: 50px 24px 120px; text-align: center;
            background: linear-gradient(170deg, var(--navy-dark) 0%, #0a1420 100%);
            position: relative; overflow: hidden;
        }
        .signup::before {
            content: ''; position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
            width: 700px; height: 550px;
            background: radial-gradient(circle, rgba(184,224,74,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        .signup-inner { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; }
        .signup-icon {
            width: 96px; margin: 0 auto 30px; display: block;
            filter: drop-shadow(0 4px 32px rgba(184,224,74,0.35));
        }
        .signup h2 {
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.4rem, 7vw, 3.6rem);
            letter-spacing: 0.05em; line-height: 1; margin-bottom: 14px;
        }
        .signup h2 em { font-style: normal; color: var(--lime); }
        .signup p { color: var(--text-muted); font-size: 1rem; margin-bottom: 18px; line-height: 1.65; max-width: 420px; margin-left: auto; margin-right: auto; }
        .signup ul {
            max-width: 420px;
            margin-left: auto; 
            margin-right: auto;
            text-align: center;
        }
        .signup ul li {
            list-style-type: none;
            font-family: 'Barlow', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 18px;
            color: var(--off-white);
        }
        .signup img.perks-icon {
            width: 20px; 
            filter: drop-shadow(0 2px 8px rgba(184,224,74,0.25));
            margin-right: 12px;
        }
        .ml-embedded { max-width: 480px; margin: 0 auto; }

        /* ── FOOTER ── */
        footer {
            background: #0a0f18;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 36px 24px; text-align: center;
        }
        .footer-logo { width: 180px; margin: 0 auto 12px; display: block; filter: drop-shadow(0 2px 12px rgba(184,224,74,0.15)); }
        footer p { font-size: 0.78rem; color: var(--text-muted); }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(9px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.7); }
        }
        .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
        .reveal.visible { opacity: 1; transform: none; }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }

        @media (max-width: 680px) {
            .phases-track { flex-direction: column; }
            .phase-card { border-radius: 0 !important; border-right: 1px solid rgba(184,224,74,0.1) !important; }
            .phase-card:first-child { border-radius: 8px 8px 0 0 !important; }
            .phase-card:last-child  { border-radius: 0 0 8px 8px !important; }
            .phase-connector { display: none; }
            .wildcard-strip { flex-direction: column; text-align: center; }
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- SIGNUP -->
    <section class="signup" id="signup">
        <div class="signup-inner">
            <img class="signup-icon reveal" src="assets/icon.png" alt="Totally Football">
            <h2 class="reveal">Thanks for joining the <em>Squad</em></h2>
            <p class="section-eyebrow reveal">Now become part of the <span class="lime">Starting XI</span> for just <span class="lime">£1</span></p>
            <ul>
                <li>Early access to our Kickstarter</li>
                <li>Special Starting XI-only rewards and discounts</li>
                <li>Exclusive updates and behind-the-scenes content</li>
            </ul>

            <a class="btn-primary reveal" href="https://totally-football-board-game.myshopify.com/products/vip-access">Join the starting XI</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <img class="footer-logo" src="assets/logo.png" alt="Totally Football">
        <p>© 2026 Totally Football. All rights reserved.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
